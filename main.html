<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAIR CODE - Login</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0a0a0a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Poppins', sans-serif;
  color: #fff;
  padding: 20px;
}

/* ===== LOGIN PAGE ===== */
.login-card {
  width: 100%;
  max-width: 400px;
  background: #1a1a2e;
  border-radius: 20px;
  padding: 35px;
  text-align: center;
  border: 2px solid transparent;
  position: relative;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  animation: fadeIn 0.4s ease;
}

.login-card::before {
  content: '';
  position: absolute;
  top: -2px; left: -2px; right: -2px; bottom: -2px;
  background: linear-gradient(45deg, #ff006e, #8338ec, #00f5ff, #ffbe0b);
  background-size: 400% 400%;
  border-radius: 22px;
  z-index: -1;
  animation: rgbBorder 8s linear infinite;
}

@keyframes rgbBorder {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.login-icon {
  width: 70px;
  height: 70px;
  margin: 0 auto 15px;
  background: linear-gradient(135deg, #ff006e, #8338ec);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
}

.login-card h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 4px;
  background: linear-gradient(90deg, #ff006e, #00f5ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.login-card .subtitle {
  color: rgba(255,255,255,0.4);
  font-size: 12px;
  margin-bottom: 25px;
  letter-spacing: 2px;
}

.input-group {
  text-align: left;
  margin-bottom: 15px;
}

.input-group label {
  display: block;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.input-group input {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  outline: none;
  background: rgba(0,0,0,0.3);
  color: #fff;
  font-family: 'Poppins', sans-serif;
  font-size: 15px;
  transition: border-color 0.2s;
}

.input-group input:focus {
  border-color: #8338ec;
}

.input-group input::placeholder {
  color: rgba(255,255,255,0.25);
}

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 700;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  letter-spacing: 1px;
  transition: transform 0.15s, opacity 0.15s;
  color: #fff;
}

.btn:active {
  transform: scale(0.98);
}

.btn-primary {
  background: linear-gradient(135deg, #8338ec, #3a86ff);
  box-shadow: 0 4px 15px rgba(131,56,236,0.25);
  margin-top: 10px;
}

.btn-primary:hover {
  opacity: 0.9;
}

.btn-success {
  background: linear-gradient(135deg, #00c853, #00e676);
  box-shadow: 0 4px 15px rgba(0,200,83,0.25);
}

.btn-success:hover {
  opacity: 0.9;
}

.btn-danger {
  background: linear-gradient(135deg, #ff1744, #ff5252);
  box-shadow: 0 4px 15px rgba(255,23,68,0.25);
}

.btn-danger:hover {
  opacity: 0.9;
}

.btn-small {
  width: auto;
  padding: 8px 16px;
  font-size: 12px;
}

.toggle-text {
  margin-top: 18px;
  font-size: 13px;
  color: rgba(255,255,255,0.4);
}

.toggle-text a {
  color: #00f5ff;
  cursor: pointer;
  text-decoration: none;
}

.toggle-text a:hover {
  text-decoration: underline;
}

/* ===== DASHBOARD ===== */
.dashboard {
  width: 100%;
  max-width: 420px;
  display: none;
  animation: fadeIn 0.4s ease;
}

.dashboard-header {
  background: #1a1a2e;
  border-radius: 20px;
  padding: 25px;
  text-align: center;
  border: 2px solid transparent;
  position: relative;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  margin-bottom: 15px;
}

.dashboard-header::before {
  content: '';
  position: absolute;
  top: -2px; left: -2px; right: -2px; bottom: -2px;
  background: linear-gradient(45deg, #ff006e, #8338ec, #00f5ff, #ffbe0b);
  background-size: 400% 400%;
  border-radius: 22px;
  z-index: -1;
  animation: rgbBorder 8s linear infinite;
}

.profile-section {
  position: relative;
  display: inline-block;
}

.profile-img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #8338ec;
  box-shadow: 0 0 20px rgba(131,56,236,0.3);
  background: #222;
}

.profile-upload {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 30px;
  height: 30px;
  background: linear-gradient(135deg, #8338ec, #3a86ff);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 14px;
  border: 2px solid #1a1a2e;
}

.profile-upload input {
  display: none;
}

.user-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  font-weight: 700;
  margin-top: 12px;
  color: #fff;
}

.user-role {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  margin-top: 2px;
}

.logout-btn {
  position: absolute;
  top: 15px;
  right: 15px;
  background: rgba(255,23,68,0.15);
  border: 1px solid rgba(255,23,68,0.3);
  color: #ff1744;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 11px;
  cursor: pointer;
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  transition: all 0.2s;
}

.logout-btn:hover {
  background: rgba(255,23,68,0.25);
}

/* Stats Grid */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 15px;
}

.stat-card {
  background: #1a1a2e;
  border-radius: 14px;
  padding: 16px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.05);
}

.stat-card .stat-icon {
  font-size: 22px;
  margin-bottom: 6px;
}

.stat-card .stat-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: #00f5ff;
}

.stat-card .stat-label {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  margin-top: 2px;
}

/* Main Card */
.main-card {
  background: #1a1a2e;
  border-radius: 20px;
  padding: 25px;
  border: 1px solid rgba(255,255,255,0.05);
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

.main-card h3 {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  margin-bottom: 15px;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Link Number Section */
#linkSection input {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  outline: none;
  background: rgba(0,0,0,0.3);
  color: #fff;
  font-family: 'Poppins', sans-serif;
  font-size: 15px;
  text-align: center;
  margin-bottom: 12px;
}

#linkSection input:focus {
  border-color: #8338ec;
}

#linkSection input::placeholder {
  color: rgba(255,255,255,0.25);
}

/* Result */
#result {
  margin-top: 15px;
  min-height: 60px;
}

.result-box {
  background: rgba(0,0,0,0.3);
  border-radius: 14px;
  padding: 16px;
  width: 100%;
  border: 1px solid rgba(255,255,255,0.05);
  animation: fadeIn 0.3s ease;
}

.result-box h4 {
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  margin-bottom: 8px;
  color: #00e676;
}

.code-display-wrapper {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 10px 0;
  flex-wrap: wrap;
}

.code-display {
  font-family: 'Orbitron', monospace;
  font-size: 24px;
  font-weight: 900;
  letter-spacing: 3px;
  color: #00f5ff;
  text-shadow: 0 0 15px rgba(0,245,255,0.3);
}

.copy-btn {
  width: auto !important;
  padding: 8px 14px !important;
  background: linear-gradient(135deg, #8338ec, #3a86ff) !important;
  color: #fff;
  border-radius: 8px;
  font-size: 12px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  border: none;
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
}

.copy-btn:hover {
  opacity: 0.85;
}

.copy-btn.copied {
  background: linear-gradient(135deg, #00c853, #00e676) !important;
}

/* Battery */
.battery-section {
  margin-top: 15px;
  padding: 12px;
  background: rgba(0,0,0,0.25);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.05);
  display: none;
  animation: fadeIn 0.3s ease;
}

.battery-section.visible {
  display: block;
}

.battery-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 8px;
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.battery-container {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
}

.battery-body {
  width: 45px;
  height: 20px;
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 3px;
  position: relative;
  padding: 2px;
  background: rgba(0,0,0,0.3);
}

.battery-body::after {
  content: '';
  position: absolute;
  right: -4px;
  top: 50%;
  transform: translateY(-50%);
  width: 2px;
  height: 8px;
  background: rgba(255,255,255,0.25);
  border-radius: 0 1px 1px 0;
}

.battery-fill {
  height: 100%;
  border-radius: 1px;
  transition: width 0.5s ease;
}

.battery-percentage {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  min-width: 40px;
}

.battery-status {
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  margin-top: 5px;
}

.status-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 600;
  margin-top: 5px;
}

.status-good { background: rgba(0,230,118,0.12); color: #00e676; border: 1px solid rgba(0,230,118,0.2); }
.status-fair { background: rgba(255,190,11,0.12); color: #ffbe0b; border: 1px solid rgba(255,190,11,0.2); }
.status-poor { background: rgba(255,23,68,0.12); color: #ff1744; border: 1px solid rgba(255,23,68,0.2); }

/* Spinner */
.spinner {
  width: 28px;
  height: 28px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: #00f5ff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 6px auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Toast */
.toast {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #00c853;
  color: #fff;
  padding: 10px 20px;
  border-radius: 10px;
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 600;
  z-index: 1000;
  opacity: 0;
  transition: all 0.3s ease;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* Error shake */
.shake {
  animation: shake 0.4s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

/* Footer */
.footer-info {
  margin-top: 15px;
  padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 10px;
  color: rgba(255,255,255,0.25);
}

.connection-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #00e676;
  display: inline-block;
  margin-right: 5px;
}
</style>
<base target="_blank">
</head>
<body>

<div class="toast" id="toast">
  <span id="toastMsg">Copied to clipboard!</span>
</div>

<!-- ===== LOGIN PAGE ===== -->
<div class="login-card" id="loginPage">
  <div class="login-icon">🔐</div>
  <h2 id="authTitle">LOGIN</h2>
  <div class="subtitle" id="authSubtitle">Welcome back!</div>

  <div id="loginForm">
    <div class="input-group">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="Enter username">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Enter password">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">🔓 LOGIN</button>
    <div class="toggle-text">
      No account? <a onclick="showRegister()">Register</a>
    </div>
  </div>

  <div id="registerForm" style="display:none;">
    <div class="input-group">
      <label>Username</label>
      <input type="text" id="regUser" placeholder="Choose username">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="regPass" placeholder="Choose password">
    </div>
    <div class="input-group">
      <label>Confirm Password</label>
      <input type="password" id="regPass2" placeholder="Confirm password">
    </div>
    <button class="btn btn-success" onclick="doRegister()">✅ REGISTER</button>
    <div class="toggle-text">
      Have an account? <a onclick="showLogin()">Login</a>
    </div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div class="dashboard" id="dashboard">

  <!-- Profile Header -->
  <div class="dashboard-header">
    <button class="logout-btn" onclick="doLogout()">🚪 Logout</button>

    <div class="profile-section">
      <img src="" alt="Profile" class="profile-img" id="profileImg" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2290%22 height=%2290%22><rect width=%2290%22 height=%2290%22 fill=%22%23222%22/><text x=%2245%22 y=%2255%22 font-size=%2240%22 text-anchor=%22middle%22 fill=%22%23666%22>👤</text></svg>'">
      <label class="profile-upload" title="Change photo">
        📷
        <input type="file" id="profileUpload" accept="image/*" onchange="changeProfilePic(event)">
      </label>
    </div>

    <div class="user-name" id="displayName">User</div>
    <div class="user-role">Pair Code Member</div>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">📱</div>
      <div class="stat-value" id="statLinked">0</div>
      <div class="stat-label">Linked</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🔋</div>
      <div class="stat-value" id="statBattery">--</div>
      <div class="stat-label">Battery</div>
    </div>
  </div>

  <!-- Main Card -->
  <div class="main-card">
    <h3>🔗 Link New Device</h3>

    <div id="linkSection">
      <input type="text" id="number" placeholder="+94 7xx xxx xxx" maxlength="15">
      <button class="btn btn-success" id="linkBtn" onclick="linkDevice()">🔗 LINK DEVICE</button>
    </div>

    <div id="result"></div>

    <div class="battery-section" id="batterySection">
      <div class="battery-header">
        <span>🔋</span>
        <span>Device Battery</span>
      </div>
      <div class="battery-container">
        <div class="battery-body">
          <div class="battery-fill" id="batteryFill" style="width: 0%"></div>
        </div>
        <div class="battery-percentage" id="batteryPercentage">--%</div>
      </div>
      <div class="battery-status" id="batteryStatus">Checking...</div>
      <div id="batteryBadge"></div>
    </div>

    <button class="btn btn-danger" id="deleteBtn" style="display:none; margin-top:12px;" onclick="deleteDevice()">🗑️ DELETE NUMBER</button>

    <div class="footer-info">
      <div>
        <span class="connection-dot"></span>
        <span>Online</span>
      </div>
      <span id="clock">00:00</span>
    </div>
  </div>
</div>

<script>
// ===== AUTH SYSTEM =====
let currentUser = null;
let linkedNumber = "";
let currentCode = "";

// Default users (in-memory, replace with backend)
let users = JSON.parse(localStorage.getItem('paircode_users')) || {};
let userProfiles = JSON.parse(localStorage.getItem('paircode_profiles')) || {};

function showRegister() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('registerForm').style.display = 'block';
  document.getElementById('authTitle').textContent = 'REGISTER';
  document.getElementById('authSubtitle').textContent = 'Create new account';
}

function showLogin() {
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('registerForm').style.display = 'none';
  document.getElementById('authTitle').textContent = 'LOGIN';
  document.getElementById('authSubtitle').textContent = 'Welcome back!';
}

function doRegister() {
  const user = document.getElementById('regUser').value.trim();
  const pass = document.getElementById('regPass').value;
  const pass2 = document.getElementById('regPass2').value;

  if (!user || !pass) {
    showToast('Please fill all fields', 'error');
    return;
  }
  if (pass !== pass2) {
    showToast('Passwords do not match', 'error');
    return;
  }
  if (pass.length < 4) {
    showToast('Password too short', 'error');
    return;
  }
  if (users[user]) {
    showToast('Username already exists', 'error');
    return;
  }

  users[user] = { password: pass, created: new Date().toISOString() };
  localStorage.setItem('paircode_users', JSON.stringify(users));
  showToast('Account created! Please login');
  showLogin();
}

function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;

  if (!user || !pass) {
    showToast('Please enter credentials', 'error');
    return;
  }

  if (!users[user] || users[user].password !== pass) {
    showToast('Invalid username or password', 'error');
    document.getElementById('loginPage').classList.add('shake');
    setTimeout(() => document.getElementById('loginPage').classList.remove('shake'), 400);
    return;
  }

  currentUser = user;
  localStorage.setItem('paircode_currentUser', user);
  showDashboard();
}

function doLogout() {
  currentUser = null;
  linkedNumber = "";
  currentCode = "";
  localStorage.removeItem('paircode_currentUser');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginPage').style.display = 'block';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  showToast('Logged out');
}

function showDashboard() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('displayName').textContent = currentUser;

  // Load profile pic
  const profile = userProfiles[currentUser];
  if (profile && profile.pic) {
    document.getElementById('profileImg').src = profile.pic;
  }

  getBatteryHealth();
  updateClock();
}

// ===== PROFILE PIC =====
function changeProfilePic(event) {
  const file = event.target.files[0];
  if (!file) return;

  if (file.size > 2 * 1024 * 1024) {
    showToast('Image too large (max 2MB)', 'error');
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    const imgData = e.target.result;
    document.getElementById('profileImg').src = imgData;
    if (!userProfiles[currentUser]) userProfiles[currentUser] = {};
    userProfiles[currentUser].pic = imgData;
    localStorage.setItem('paircode_profiles', JSON.stringify(userProfiles));
    showToast('Profile photo updated!');
  };
  reader.readAsDataURL(file);
}

// ===== TOAST =====
function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');
  const toastMsg = document.getElementById('toastMsg');
  toastMsg.textContent = message;
  toast.style.background = type === 'error' ? '#ff1744' : '#00c853';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = 
    now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
}
setInterval(updateClock, 60000);

// ===== COPY =====
async function copyCode() {
  if (!currentCode) return;
  try {
    await navigator.clipboard.writeText(currentCode);
    showToast('Code copied!');
    const btn = document.getElementById('copyBtn');
    if (btn) {
      btn.classList.add('copied');
      btn.innerHTML = '✅ Copied!';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy`;
      }, 2000);
    }
  } catch (err) {
    showToast('Failed to copy', 'error');
  }
}

// ===== BATTERY =====
async function getBatteryHealth() {
  const fill = document.getElementById('batteryFill');
  const percentage = document.getElementById('batteryPercentage');
  const status = document.getElementById('batteryStatus');
  const badge = document.getElementById('batteryBadge');
  const statBattery = document.getElementById('statBattery');

  try {
    if ('getBattery' in navigator) {
      const battery = await navigator.getBattery();
      const level = Math.round(battery.level * 100);

      fill.style.width = level + '%';
      if (level > 60) fill.style.background = '#00e676';
      else if (level > 30) fill.style.background = '#ffbe0b';
      else fill.style.background = '#ff1744';

      percentage.textContent = level + '%';
      statBattery.textContent = level + '%';

      if (battery.charging) status.textContent = '⚡ Charging';
      else status.textContent = '🔋 On Battery';

      let badgeClass = level > 60 ? 'status-good' : level > 30 ? 'status-fair' : 'status-poor';
      let badgeText = level > 60 ? 'Good' : level > 30 ? 'Fair' : 'Low';
      badge.innerHTML = `<span class="status-badge ${badgeClass}">${badgeText}</span>`;

    } else {
      fill.style.width = '75%';
      fill.style.background = '#00e676';
      percentage.textContent = '75%';
      statBattery.textContent = '75%';
      status.textContent = '📱 Device Battery';
      badge.innerHTML = '<span class="status-badge status-good">Good</span>';
    }
  } catch (e) {
    fill.style.width = '50%';
    fill.style.background = '#ffbe0b';
    percentage.textContent = '--';
    statBattery.textContent = '--';
  }
}

// ===== LINK DEVICE =====
async function linkDevice() {
  const numInput = document.getElementById("number");
  const num = numInput.value.replace(/[^0-9]/g, "");
  const result = document.getElementById("result");
  const card = document.querySelector('.main-card');

  if (!num || num.length < 11) {
    result.innerHTML = '<div class="result-box" style="border-color:rgba(255,23,68,0.2);"><h4 style="color:#ff1744;">❗ Valid number required</h4></div>';
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 400);
    return;
  }

  result.innerHTML = '<div class="spinner"></div><p style="color:rgba(255,255,255,0.4);font-size:12px;margin-top:6px;">Linking...</p>';

  try {
    const { data } = await axios(`/code?number=${num}`);
    linkedNumber = num;
    currentCode = data.code || 'XXXXXX';

    result.innerHTML = `
      <div class="result-box">
        <h4>✅ Linked Successfully</h4>
        <div class="code-display-wrapper">
          <div class="code-display">${currentCode}</div>
          <button class="copy-btn" id="copyBtn" onclick="copyCode()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            Copy
          </button>
        </div>
        <p style="color:rgba(255,255,255,0.35);font-size:11px;margin-top:4px;">Use this code to pair your device</p>
      </div>
    `;

    document.getElementById("deleteBtn").style.display = "block";
    document.getElementById("batterySection").classList.add("visible");
    document.getElementById("statLinked").textContent = "1";
    getBatteryHealth();

  } catch (err) {
    result.innerHTML = `
      <div class="result-box" style="border-color:rgba(255,23,68,0.2);">
        <h4 style="color:#ff1744;">❌ Link Failed</h4>
        <p style="color:rgba(255,255,255,0.4);font-size:11px;">Please check the number and try again</p>
      </div>
    `;
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 400);
  }
}

// ===== DELETE =====
async function deleteDevice() {
  const result = document.getElementById("result");

  if (!linkedNumber) return;

  result.innerHTML = '<div class="spinner" style="border-top-color:#ff1744;"></div><p style="color:rgba(255,255,255,0.4);font-size:12px;margin-top:6px;">Removing...</p>';

  try {
    const { data } = await axios(`/code/delete?number=${linkedNumber}`);

    result.innerHTML = `
      <div class="result-box" style="border-color:rgba(0,230,118,0.2);">
        <h4 style="color:#00e676;">✅ ${data.message || 'Deleted'}</h4>
      </div>
    `;

    document.getElementById("deleteBtn").style.display = "none";
    document.getElementById("number").value = "";
    document.getElementById("batterySection").classList.remove("visible");
    document.getElementById("statLinked").textContent = "0";
    linkedNumber = "";
    currentCode = "";

  } catch (err) {
    result.innerHTML = `
      <div class="result-box" style="border-color:rgba(255,23,68,0.2);">
        <h4 style="color:#ff1744;">❌ Delete Failed</h4>
      </div>
    `;
  }
}

// ===== INPUT FORMAT =====
document.getElementById('number').addEventListener('input', (e) => {
  let val = e.target.value.replace(/[^0-9+ ]/g, '');
  if (val && !val.startsWith('+')) val = '+' + val;
  e.target.value = val;
});

// ===== AUTO LOGIN =====
const savedUser = localStorage.getItem('paircode_currentUser');
if (savedUser && users[savedUser]) {
  currentUser = savedUser;
  showDashboard();
}
</script>
