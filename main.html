<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANAOFC LITE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0a0a0a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Poppins', sans-serif;
  color: #fff;
  overflow: hidden;
  position: relative;
}

/* Animated Background */
.bg-animation {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  background: 
    radial-gradient(ellipse at 20% 80%, rgba(120, 0, 255, 0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(0, 255, 200, 0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(255, 0, 150, 0.08) 0%, transparent 50%);
  animation: bgShift 8s ease-in-out infinite alternate;
}

@keyframes bgShift {
  0% { filter: hue-rotate(0deg) brightness(1); }
  50% { filter: hue-rotate(30deg) brightness(1.1); }
  100% { filter: hue-rotate(-20deg) brightness(0.95); }
}

/* Floating Orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.4;
  animation: float 15s ease-in-out infinite;
  z-index: -1;
}

.orb-1 {
  width: 400px;
  height: 400px;
  background: linear-gradient(135deg, #ff006e, #8338ec);
  top: -100px;
  left: -100px;
  animation-delay: 0s;
}

.orb-2 {
  width: 300px;
  height: 300px;
  background: linear-gradient(135deg, #00f5ff, #0066ff);
  bottom: -80px;
  right: -80px;
  animation-delay: -5s;
}

.orb-3 {
  width: 250px;
  height: 250px;
  background: linear-gradient(135deg, #ffbe0b, #fb5607);
  top: 50%;
  left: 50%;
  animation-delay: -10s;
}

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(50px, -50px) scale(1.1); }
  50% { transform: translate(-30px, 30px) scale(0.9); }
  75% { transform: translate(40px, 20px) scale(1.05); }
}

/* Grid Lines */
.grid-lines {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  z-index: -1;
  animation: gridMove 20s linear infinite;
}

@keyframes gridMove {
  0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
  100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
}

/* Card */
.card {
  width: 400px;
  background: rgba(20, 20, 30, 0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 35px;
  text-align: center;
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 
    0 8px 32px rgba(0, 0, 0, 0.4),
    0 0 80px rgba(120, 0, 255, 0.1),
    inset 0 1px 0 rgba(255, 255, 255, 0.1);
  position: relative;
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card::before {
  content: '';
  position: absolute;
  top: -2px;
  left: -2px;
  right: -2px;
  bottom: -2px;
  background: linear-gradient(45deg, #ff006e, #8338ec, #00f5ff, #ffbe0b, #ff006e);
  background-size: 400% 400%;
  border-radius: 26px;
  z-index: -1;
  animation: rgbBorder 6s linear infinite;
  opacity: 0.5;
}

@keyframes rgbBorder {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 
    0 12px 40px rgba(0, 0, 0, 0.5),
    0 0 100px rgba(120, 0, 255, 0.15),
    inset 0 1px 0 rgba(255, 255, 255, 0.15);
}

/* Header */
.header-icon {
  width: 70px;
  height: 70px;
  margin: 0 auto 20px;
  background: linear-gradient(135deg, #ff006e, #8338ec);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  box-shadow: 0 0 30px rgba(255, 0, 110, 0.4);
  animation: iconPulse 3s ease-in-out infinite;
}

@keyframes iconPulse {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 0, 110, 0.4); }
  50% { box-shadow: 0 0 50px rgba(255, 0, 110, 0.7); }
}

h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 5px;
  background: linear-gradient(90deg, #ff006e, #00f5ff, #ffbe0b);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: textShine 3s linear infinite;
}

@keyframes textShine {
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}

.subtitle {
  color: rgba(255, 255, 255, 0.5);
  font-size: 12px;
  margin-bottom: 25px;
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* Input */
.input-wrapper {
  position: relative;
  margin: 15px 0;
}

input {
  width: 100%;
  padding: 15px 20px;
  border: 2px solid rgba(255, 255, 255, 0.1);
  border-radius: 14px;
  outline: none;
  background: rgba(0, 0, 0, 0.3);
  color: #fff;
  font-family: 'Poppins', sans-serif;
  font-size: 15px;
  transition: all 0.3s ease;
  text-align: center;
  letter-spacing: 1px;
}

input::placeholder {
  color: rgba(255, 255, 255, 0.3);
}

input:focus {
  border-color: #8338ec;
  box-shadow: 0 0 20px rgba(131, 56, 236, 0.3);
  background: rgba(0, 0, 0, 0.5);
}

/* Buttons */
button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-weight: 700;
  font-family: 'Poppins', sans-serif;
  font-size: 15px;
  letter-spacing: 1px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s ease;
}

button:hover::before {
  left: 100%;
}

#linkBtn {
  background: linear-gradient(135deg, #00c853, #00e676);
  color: #fff;
  margin-top: 10px;
  box-shadow: 0 4px 20px rgba(0, 200, 83, 0.3);
}

#linkBtn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0, 200, 83, 0.5);
}

#linkBtn:active {
  transform: translateY(0);
}

#deleteBtn {
  background: linear-gradient(135deg, #ff1744, #ff5252);
  color: #fff;
  display: none;
  margin-top: 15px;
  box-shadow: 0 4px 20px rgba(255, 23, 68, 0.3);
}

#deleteBtn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(255, 23, 68, 0.5);
}

/* Result */
#result {
  margin-top: 20px;
  min-height: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.result-box {
  background: rgba(0, 0, 0, 0.4);
  border-radius: 16px;
  padding: 20px;
  width: 100%;
  border: 1px solid rgba(255, 255, 255, 0.05);
  animation: fadeInUp 0.5s ease;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.result-box h3 {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  margin-bottom: 10px;
  color: #00e676;
}

.result-box .code-display {
  font-family: 'Orbitron', monospace;
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 4px;
  background: linear-gradient(90deg, #00f5ff, #ffbe0b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
  animation: codeGlow 2s ease-in-out infinite alternate;
}

@keyframes codeGlow {
  from { text-shadow: 0 0 20px rgba(0, 245, 255, 0.3); }
  to { text-shadow: 0 0 40px rgba(0, 245, 255, 0.6); }
}

/* Loading Spinner */
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255, 255, 255, 0.1);
  border-top-color: #00f5ff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 10px auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Battery Health Section */
.battery-section {
  margin-top: 20px;
  padding: 15px;
  background: rgba(0, 0, 0, 0.3);
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  display: none;
  animation: fadeInUp 0.5s ease;
}

.battery-section.visible {
  display: block;
}

.battery-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 12px;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.6);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.battery-container {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
}

.battery-body {
  width: 50px;
  height: 24px;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-radius: 4px;
  position: relative;
  padding: 2px;
  background: rgba(0, 0, 0, 0.3);
}

.battery-body::after {
  content: '';
  position: absolute;
  right: -5px;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 10px;
  background: rgba(255, 255, 255, 0.3);
  border-radius: 0 2px 2px 0;
}

.battery-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 1s ease, background 0.5s ease;
  position: relative;
  overflow: hidden;
}

.battery-fill::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  animation: batteryShine 2s ease-in-out infinite;
}

@keyframes batteryShine {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.battery-percentage {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  font-weight: 700;
  min-width: 50px;
}

.battery-status {
  font-size: 11px;
  color: rgba(255, 255, 255, 0.5);
  margin-top: 8px;
}

/* Status badges */
.status-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  margin-top: 8px;
}

.status-good { background: rgba(0, 230, 118, 0.15); color: #00e676; border: 1px solid rgba(0, 230, 118, 0.3); }
.status-fair { background: rgba(255, 190, 11, 0.15); color: #ffbe0b; border: 1px solid rgba(255, 190, 11, 0.3); }
.status-poor { background: rgba(255, 23, 68, 0.15); color: #ff1744; border: 1px solid rgba(255, 23, 68, 0.3); }

/* Particle effects on success */
.particles {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
  z-index: 10;
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #00f5ff;
  border-radius: 50%;
  animation: particleFloat 3s ease-out forwards;
}

@keyframes particleFloat {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-100px) scale(0); }
}

/* Error shake */
.shake {
  animation: shake 0.5s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  75% { transform: translateX(10px); }
}

/* Footer info */
.footer-info {
  margin-top: 20px;
  padding-top: 15px;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: rgba(255, 255, 255, 0.3);
}

.connection-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #00e676;
  box-shadow: 0 0 10px rgba(0, 230, 118, 0.5);
  animation: dotPulse 2s ease-in-out infinite;
}

@keyframes dotPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* Responsive */
@media (max-width: 450px) {
  .card {
    width: 90vw;
    padding: 25px;
  }
}
</style>
</head>
<body>

<div class="bg-animation"></div>
<div class="grid-lines"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="card">
  <div class="particles" id="particles"></div>
  
  <div class="header-icon">🔗</div>
  <h2>MANAOFC LITE</h2>
  <div class="subtitle">Secure Device Linking</div>

  <div class="input-wrapper">
    <input type="text" id="number" placeholder="+94 7xx xxx xxx" maxlength="15">
  </div>
  
  <button id="linkBtn">🔗 LINK DEVICE</button>

  <div id="result"></div>

  <!-- Battery Health Section -->
  <div class="battery-section" id="batterySection">
    <div class="battery-header">
      <span>🔋</span>
      <span>Battery Health</span>
    </div>
    <div class="battery-container">
      <div class="battery-body">
        <div class="battery-fill" id="batteryFill" style="width: 0%"></div>
      </div>
      <div class="battery-percentage" id="batteryPercentage">--%</div>
    </div>
    <div class="battery-status" id="batteryStatus">Checking...</div>
    <div id="batteryBadge"></div>
  </div>

  <button id="deleteBtn">🗑️ DELETE NUMBER</button>

  <div class="footer-info">
    <div style="display:flex;align-items:center;gap:6px;">
      <div class="connection-dot"></div>
      <span>System Online</span>
    </div>
    <span id="clock">00:00</span>
  </div>
</div>

<script>
let linkedNumber = "";

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = 
    now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

// Particle effect
function createParticles() {
  const container = document.getElementById('particles');
  container.innerHTML = '';
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = '50%';
    p.style.background = ['#ff006e', '#8338ec', '#00f5ff', '#ffbe0b'][Math.floor(Math.random() * 4)];
    p.style.animationDelay = Math.random() * 2 + 's';
    p.style.animationDuration = (2 + Math.random() * 2) + 's';
    container.appendChild(p);
  }
  setTimeout(() => container.innerHTML = '', 3000);
}

// Battery Health
async function getBatteryHealth() {
  const section = document.getElementById('batterySection');
  const fill = document.getElementById('batteryFill');
  const percentage = document.getElementById('batteryPercentage');
  const status = document.getElementById('batteryStatus');
  const badge = document.getElementById('batteryBadge');
  
  section.classList.add('visible');
  
  try {
    if ('getBattery' in navigator) {
      const battery = await navigator.getBattery();
      const level = Math.round(battery.level * 100);
      const charging = battery.charging;
      
      // Animate fill
      setTimeout(() => {
        fill.style.width = level + '%';
        
        // Color based on level
        if (level > 60) {
          fill.style.background = 'linear-gradient(90deg, #00e676, #00c853)';
        } else if (level > 30) {
          fill.style.background = 'linear-gradient(90deg, #ffbe0b, #ff9100)';
        } else {
          fill.style.background = 'linear-gradient(90deg, #ff1744, #ff5252)';
        }
      }, 100);
      
      percentage.textContent = level + '%';
      
      if (charging) {
        status.textContent = '⚡ Charging...';
        status.style.color = '#00e676';
      } else {
        const timeRemaining = battery.dischargingTime;
        if (timeRemaining !== Infinity && !isNaN(timeRemaining)) {
          const hours = Math.floor(timeRemaining / 3600);
          const mins = Math.floor((timeRemaining % 3600) / 60);
          status.textContent = `⏱️ ${hours}h ${mins}m remaining`;
        } else {
          status.textContent = '🔋 On Battery';
        }
        status.style.color = 'rgba(255,255,255,0.5)';
      }
      
      // Health badge
      let badgeClass = '';
      let badgeText = '';
      if (level > 80) {
        badgeClass = 'status-good';
        badgeText = 'Excellent';
      } else if (level > 50) {
        badgeClass = 'status-good';
        badgeText = 'Good';
      } else if (level > 30) {
        badgeClass = 'status-fair';
        badgeText = 'Fair';
      } else {
        badgeClass = 'status-poor';
        badgeText = 'Low';
      }
      badge.innerHTML = `<span class="status-badge ${badgeClass}">${badgeText}</span>`;
      
      // Listen for changes
      battery.addEventListener('levelchange', getBatteryHealth);
      battery.addEventListener('chargingchange', getBatteryHealth);
      
    } else {
      // Fallback for browsers without Battery API
      fill.style.width = '75%';
      fill.style.background = 'linear-gradient(90deg, #00e676, #00c853)';
      percentage.textContent = '75%';
      status.textContent = '📱 Device Battery';
      badge.innerHTML = '<span class="status-badge status-good">Good</span>';
    }
  } catch (e) {
    fill.style.width = '60%';
    fill.style.background = 'linear-gradient(90deg, #ffbe0b, #ff9100)';
    percentage.textContent = '--';
    status.textContent = 'Battery info unavailable';
  }
}

document.getElementById("linkBtn").addEventListener("click", async () => {
  const numInput = document.getElementById("number");
  const num = numInput.value.replace(/[^0-9]/g, "");
  const result = document.getElementById("result");
  const card = document.querySelector('.card');

  if (!num || num.length < 11) {
    result.innerHTML = '<div class="result-box" style="border-color:rgba(255,23,68,0.3);"><h3 style="color:#ff1744;">❗ Valid number required</h3></div>';
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 500);
    return;
  }

  result.innerHTML = '<div class="spinner"></div><p style="color:rgba(255,255,255,0.5);font-size:13px;margin-top:10px;">Linking device...</p>';

  try {
    const { data } = await axios(`/code?number=${num}`);
    linkedNumber = num;

    createParticles();
    
    result.innerHTML = `
      <div class="result-box">
        <h3>✅ Linked Successfully</h3>
        <div class="code-display">${data.code || 'XXXXXX'}</div>
        <p style="color:rgba(255,255,255,0.4);font-size:12px;margin-top:8px;">Use this code to pair your device</p>
      </div>
    `;

    document.getElementById("deleteBtn").style.display = "block";
    
    // Show battery health
    getBatteryHealth();

  } catch (err) {
    result.innerHTML = `
      <div class="result-box" style="border-color:rgba(255,23,68,0.3);">
        <h3 style="color:#ff1744;">❌ Link Failed</h3>
        <p style="color:rgba(255,255,255,0.5);font-size:12px;">Please check the number and try again</p>
      </div>
    `;
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 500);
  }
});

document.getElementById("deleteBtn").addEventListener("click", async () => {
  const result = document.getElementById("result");
  const batterySection = document.getElementById("batterySection");

  if (!linkedNumber) return;

  result.innerHTML = '<div class="spinner" style="border-top-color:#ff1744;"></div><p style="color:rgba(255,255,255,0.5);font-size:13px;margin-top:10px;">Removing device...</p>';

  try {
    const { data } = await axios(`/code/delete?number=${linkedNumber}`);

    result.innerHTML = `
      <div class="result-box" style="border-color:rgba(0,230,118,0.3);">
        <h3 style="color:#00e676;">✅ ${data.message || 'Deleted Successfully'}</h3>
      </div>
    `;
    
    document.getElementById("deleteBtn").style.display = "none";
    document.getElementById("number").value = "";
    batterySection.classList.remove('visible');
    linkedNumber = "";

  } catch (err) {
    result.innerHTML = `
      <div class="result-box" style="border-color:rgba(255,23,68,0.3);">
        <h3 style="color:#ff1744;">❌ Delete Failed</h3>
      </div>
    `;
  }
});

// Input formatting
const numberInput = document.getElementById('number');
numberInput.addEventListener('input', (e) => {
  let val = e.target.value.replace(/[^0-9+\s]/g, '');
  if (val && !val.startsWith('+')) {
    val = '+' + val;
  }
  e.target.value = val;
});
</script>

</body>
</html>
