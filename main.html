<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MANAOFC LITE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f0c29;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
min-height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
position:relative;
}

/* PARTICLE BG */
#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* GLASS CARD */
.container{
position:relative;
z-index:2;
width:400px;
padding:35px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 0 40px rgba(0,0,0,0.4);
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
text-align:center;
font-size:40px;
margin-bottom:10px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-8px);
}
}

h1{
text-align:center;
font-size:28px;
margin-bottom:8px;
background:linear-gradient(90deg,#e0aaff,#00ffe0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
font-size:14px;
color:#ccc;
margin-bottom:25px;
}

.input-box{
position:relative;
margin-bottom:20px;
}

.input-box input{
width:100%;
padding:15px 18px;
border:none;
outline:none;
border-radius:15px;
background:rgba(255,255,255,0.1);
color:white;
font-size:16px;
transition:0.3s;
border:1px solid transparent;
}

.input-box input:focus{
border:1px solid #c77dff;
box-shadow:0 0 15px rgba(199,125,255,0.5);
}

.input-box input::placeholder{
color:#ddd;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:linear-gradient(90deg,#9d4edd,#7b2cbf);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
position:relative;
overflow:hidden;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 0 20px rgba(157,78,221,0.6);
}

.btn:active{
transform:scale(0.97);
}

#pair{
margin-top:25px;
text-align:center;
animation:fadeIn 0.5s ease;
}

#codeText{
font-size:30px;
margin-bottom:18px;
letter-spacing:3px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{
transform:scale(1);
}
50%{
transform:scale(1.05);
}
100%{
transform:scale(1);
}
}

.copy-btn{
background:linear-gradient(90deg,#00c9a7,#00b4d8);
margin-top:10px;
}

#copyMsg{
margin-top:10px;
font-size:14px;
}

/* FOOTER */
.footer{
margin-top:25px;
text-align:center;
font-size:13px;
color:#aaa;
}

/* MODAL */
#welcomeModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(8px);
display:flex;
justify-content:center;
align-items:center;
z-index:10;
animation:fadeIn 0.5s ease;
}

.modal-content{
background:#1e1b4b;
padding:40px;
border-radius:25px;
text-align:center;
width:350px;
box-shadow:0 0 40px rgba(0,0,0,0.5);
animation:zoom 0.5s ease;
}

@keyframes zoom{
from{
transform:scale(0.7);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.modal-content h2{
margin-bottom:10px;
font-size:30px;
color:#e0aaff;
}

.modal-content p{
margin-bottom:20px;
color:#ddd;
font-size:14px;
}

.glow{
position:absolute;
width:300px;
height:300px;
background:#9d4edd;
filter:blur(120px);
opacity:0.25;
border-radius:50%;
z-index:1;
animation:moveGlow 10s linear infinite alternate;
}

@keyframes moveGlow{
0%{
top:-100px;
left:-100px;
}
100%{
top:50%;
left:60%;
}
}

@media(max-width:450px){

.container{
width:92%;
padding:25px;
}

h1{
font-size:24px;
}

}

</style>
</head>
<body>

<div class="glow"></div>

<div id="particles"></div>

<!-- WELCOME MODAL -->
<div id="welcomeModal">
<div class="modal-content">

<h2>✨ Welcome</h2>

<p>
Generate your pairing code with smooth animations and modern UI.
</p>

<button class="btn" id="continueBtn">
Continue
</button>

</div>
</div>

<!-- MAIN CARD -->
<div class="container">

<div class="logo">⚡</div>

<h1>MANAOFC LITE</h1>

<p class="subtitle">
Enter your WhatsApp number to generate a pairing code
</p>

<div class="input-box">
<input type="text" id="phone" placeholder="Enter phone number">
</div>

<button class="btn" id="requestPairing">
Generate Pair Code
</button>

<div id="pair"></div>

<div class="footer">
© <span id="year"></span> All Rights Reserved
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>

document.getElementById("year").innerText=new Date().getFullYear()

document.getElementById("continueBtn").onclick=()=>{

document.getElementById("welcomeModal").style.display="none"

}

const btn=document.getElementById("requestPairing")
const number=document.getElementById("phone")
const pair=document.getElementById("pair")

btn.onclick=async()=>{

let num=number.value.replace(/\D/g,'')

if(!num){

pair.innerHTML="<span style='color:#ff4d6d'>⚠ Enter number</span>"
return

}

pair.innerHTML="<span style='color:#00ffe0'>Generating...</span>"

try{

let res=await axios(`/code?number=${num}`)

let code=res.data.code

pair.innerHTML=`

<h2 id="codeText">CODE : ${code}</h2>

<button class="btn copy-btn" onclick="copyCode()">
📋 Copy Code
</button>

<p id="copyMsg"></p>

`

}catch{

pair.innerHTML="<span style='color:red'>❌ Server Error</span>"

}

}

function copyCode(){

let text=document.getElementById("codeText").innerText.replace("CODE : ","")

navigator.clipboard.writeText(text)

document.getElementById("copyMsg").innerHTML="<span style='color:#00ffae'>✔ Copied!</span>"

}

/* PARTICLES */

const canvas=document.createElement("canvas")

document.getElementById("particles").appendChild(canvas)

const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<100;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
dx:(Math.random()-0.5)*1,
dy:(Math.random()-0.5)*1

})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

p.x+=p.dx
p.y+=p.dy

if(p.x<0||p.x>canvas.width)p.dx*=-1
if(p.y<0||p.y>canvas.height)p.dy*=-1

ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fillStyle="rgba(179,136,255,0.8)"
ctx.fill()

})

requestAnimationFrame(animate)

}

animate()

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth
canvas.height=window.innerHeight

})

</script>

</body>
</html>
