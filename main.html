<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MANAOFC-LITE BOT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(138, 43, 226, 0.6);
      border-radius: 50%;
      animation: float 15s infinite;
      box-shadow: 0 0 10px rgba(138, 43, 226, 0.8);
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) rotate(720deg);
        opacity: 0;
      }
    }

    /* Scanline effect */
    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0),
        rgba(255,255,255,0) 50%,
        rgba(0,0,0,0.1) 50%,
        rgba(0,0,0,0.1)
      );
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 1;
      opacity: 0.3;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      position: relative;
    }

    /* Animated robot icon */
    .robot-icon {
      font-size: 60px;
      color: #8a2be2;
      margin-bottom: 15px;
      animation: robotBounce 2s ease-in-out infinite, robotGlow 2s ease-in-out infinite alternate;
      text-shadow: 0 0 20px rgba(138, 43, 226, 0.8), 0 0 40px rgba(138, 43, 226, 0.4);
    }

    @keyframes robotBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes robotGlow {
      from { filter: drop-shadow(0 0 5px #8a2be2); }
      to { filter: drop-shadow(0 0 25px #8a2be2) drop-shadow(0 0 50px #8a2be2); }
    }

    /* Title styling */
    .bot-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 5px;
      text-shadow: 0 0 10px rgba(138, 43, 226, 0.8), 0 0 30px rgba(138, 43, 226, 0.5);
      animation: titlePulse 3s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .bot-subtitle {
      font-size: 12px;
      color: #a8e4a0;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 30px;
      animation: typing 3s steps(20) infinite alternate;
      white-space: nowrap;
      overflow: hidden;
      border-right: 2px solid #a8e4a0;
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    .box {
      width: 380px;
      padding: 35px 30px;
      position: relative;
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 
        0 8px 32px 0 rgba(31, 38, 135, 0.37),
        inset 0 0 20px rgba(138, 43, 226, 0.1);
      transform: perspective(1000px) rotateY(0deg);
      animation: boxFloat 6s ease-in-out infinite;
      overflow: hidden;
    }

    @keyframes boxFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* Corner decorations */
    .box::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, #8a2be2, #00ffff, #8a2be2, #ff00ff);
      background-size: 400% 400%;
      z-index: -1;
      border-radius: 22px;
      animation: borderGlow 3s ease infinite;
      opacity: 0.5;
    }

    @keyframes borderGlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Inner glow line */
    .box::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #8a2be2, transparent);
      animation: scanLine 3s linear infinite;
    }

    @keyframes scanLine {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    #text {
      color: #fff;
    }

    .centered-text {
      text-align: center;
      color: #fff;
    }

    .main-icon {
      font-size: 40px;
      color: #8a2be2;
      margin-bottom: 15px;
      animation: iconSpin 4s linear infinite;
    }

    @keyframes iconSpin {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }

    h3.centered-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 5px;
      text-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
    }

    h6 {
      font-size: 11px;
      color: #a8e4a0;
      font-weight: 400;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .input-container {
      display: flex;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 4px;
      gap: 4px;
      max-width: 320px;
      width: 100%;
      margin: 0 auto;
      border: 1px solid rgba(138, 43, 226, 0.3);
      transition: all 0.3s ease;
    }

    .input-container:focus-within {
      border-color: #8a2be2;
      box-shadow: 0 0 20px rgba(138, 43, 226, 0.3);
      transform: scale(1.02);
    }

    .input-container input {
      border-radius: 12px 0 0 12px;
      background: rgba(0, 0, 0, 0.3);
      width: 70%;
      flex-basis: 70%;
      padding: 14px 16px;
      border: none;
      color: #fff;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s ease;
    }

    .input-container input::placeholder {
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
    }

    .input-container input:focus {
      outline: none;
      background: rgba(0, 0, 0, 0.5);
    }

    .input-container button {
      flex-basis: 30%;
      padding: 14px;
      background: linear-gradient(135deg, #8a2be2 0%, #4a0080 100%);
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: white;
      border: none;
      width: 100%;
      border-radius: 0 12px 12px 0;
      transition: all 0.3s ease;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      position: relative;
      overflow: hidden;
    }

    .input-container button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s ease;
    }

    .input-container button:hover::before {
      left: 100%;
    }

    .input-container button:hover {
      background: linear-gradient(135deg, #A8E4A0 0%, #32CD32 100%);
      color: #1a1a2e;
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(138, 43, 226, 0.4);
    }

    .input-container button:active {
      transform: translateY(0);
    }

    #waiting-message {
      display: block;
      margin-top: 15px;
      color: #00ffff;
      font-size: 13px;
      font-weight: 600;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    #pair {
      margin-top: 15px;
      min-height: 40px;
    }

    /* Code display styling */
    .code-display {
      display: inline-block;
      padding: 15px 25px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid #8a2be2;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      animation: codeAppear 0.5s ease-out;
    }

    @keyframes codeAppear {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .code-display:hover {
      background: rgba(138, 43, 226, 0.2);
      box-shadow: 0 0 30px rgba(138, 43, 226, 0.4);
      transform: scale(1.05);
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid rgba(138, 43, 226, 0.3);
      border-radius: 50%;
      border-top-color: #8a2be2;
      animation: spin 1s ease-in-out infinite;
      margin: 10px auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error shake animation */
    .shake {
      animation: shake 0.5s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    /* Footer */
    .footer-text {
      margin-top: 20px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 2px;
    }

    @media (max-width: 500px) {
      .box {
        width: 90vw;
        padding: 25px 20px;
      }

      .bot-title {
        font-size: 22px;
      }

      .input-container {
        flex-direction: column;
      }

      .input-container input {
        border-radius: 12px;
        width: 100%;
        flex-basis: auto;
      }

      .input-container button {
        border-radius: 12px;
        flex-basis: auto;
        margin-top: 4px;
      }
    }
  </style>
</head>
<body>
  <!-- Floating particles -->
  <div class="particles" id="particles"></div>
  
  <!-- Scanline overlay -->
  <div class="scanlines"></div>

  <div class="container">
    <!-- Robot icon -->
    <i class="fas fa-robot robot-icon"></i>
    
    <!-- Title -->
    <div class="bot-title">MANAOFC-LITE BOT</div>
    <div class="bot-subtitle">Advanced Pairing System</div>

    <div class="main">
      <div class="box" id="box">
        <div id="text">
          <i class="fas fa-mobile-alt main-icon"></i>
          <p>
            <h3 class="centered-text">∞ Link with Phone Number ∞</h3>
            <br>
            <h6>🌴 Enter Your Number With Country Code 🌴</h6>
            <div class="input-container">
              <input placeholder="+94xxxxxxxx" type="number" id="number" name="">
              <button id="submit">enter</button>
            </div>
           
            <a id="waiting-message" class="centered-text" style="display: none;">
              <div class="spinner"></div>
              <div>Processing your request...</div>
            </a>
            <br>
            <main id="pair"></main>
          </p>
        </div>
      </div>
    </div>
    
    <div class="footer-text">MANAOFC-LITE BOT CREATE BY BY MANAOFC CODER</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    // Create floating particles
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 15 + 's';
      particle.style.animationDuration = (10 + Math.random() * 10) + 's';
      particle.style.width = (2 + Math.random() * 4) + 'px';
      particle.style.height = particle.style.width;
      particlesContainer.appendChild(particle);
    }

    let a = document.getElementById("pair");
    let b = document.getElementById("submit");
    let c = document.getElementById("number");
    let box = document.getElementById("box");
    let waitingMsg = document.getElementById("waiting-message");

    async function Copy() {
      let text = document.getElementById("copy").innerText;
      let obj = document.getElementById("copy");
      await navigator.clipboard.writeText(obj.innerText.replace('CODE: ', ''));
      obj.innerHTML = '<span style="color:#00ff00;font-weight:bold"><i class="fas fa-check"></i> COPIED!</span>';
      obj.style = "color:#00ff00;font-weight:bold";
      obj.size = "5";
      setTimeout(() => {
        obj.innerHTML = text;
        obj.style = "color:#ff4444;font-weight:bold";
        obj.size = "5";
      }, 1500);
    }

    b.addEventListener("click", async (e) => {
      e.preventDefault();
      
      // Reset animations
      box.classList.remove('shake');
      void box.offsetWidth; // Trigger reflow
      
      if (!c.value) {
        box.classList.add('shake');
        a.innerHTML = '<a style="color:#ff6b6b;font-weight:bold"><i class="fas fa-exclamation-triangle"></i> Enter your WhatsApp number with country code.</a><br><br>';
      } else if (c.value.replace(/[^0-9]/g, "").length < 11) {
        box.classList.add('shake');
        a.innerHTML = '<a style="color:#ff6b6b;font-weight:bold"><i class="fas fa-times-circle"></i> Invalid number format</a><br><br>';
      } else {
        const bc = c.value.replace(/[^0-9]/g, "");
        let bb = "";
        let bbc = "";
        const cc = bc.split('');
        cc.map(a => {
          bbc += a;
          if (bbc.length == 3) {
            bb += " " + a;
          } else if (bbc.length == 8) {
            bb += " " + a;
          } else {
            bb += a;
          }
        });
        c.type = "text";
        c.value = "+" + bb;
        c.style = "color:#00ffff;font-size:16px;font-weight:600";
        
        // Show loading
        waitingMsg.style.display = 'block';
        a.innerHTML = '';
        
        try {
          let { data } = await axios(`/code?number=${bc}`);
          let code = data.code || "Service Unavailable";
          
          waitingMsg.style.display = 'none';
          a.innerHTML = '<div class="code-display" id="copy" onclick="Copy()" style="color:#ff4444;font-weight:bold" size="5">CODE: <span style="color:#00ff00;font-weight:bold">' + code + '</span></div><br><br><div style="color:rgba(255,255,255,0.5);font-size:11px;margin-top:5px"><i class="fas fa-hand-pointer"></i> Click to copy</div>';
        } catch (error) {
          waitingMsg.style.display = 'none';
          a.innerHTML = '<a style="color:#ff6b6b;font-weight:bold"><i class="fas fa-plug"></i> Connection Error</a><br><br>';
        }
      }
    });

    // Add enter key support
    c.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        b.click();
      }
    });
  </script>
</body>
</html>
