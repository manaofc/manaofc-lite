<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAIR CODE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #141414;
      font-family: 'Arial', sans-serif;
      color: #fff;
    }

    .card {
      width: 340px;
      border-radius: 14px;
      box-shadow: 0 0 28px rgba(0,0,0,0.8);
      overflow: hidden;
    }

    .tabs {
      display: flex;
    }

    .tab-btn {
      flex: 1;
      padding: 14px 0;
      border: none;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.05rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .tab-btn.link {
      background: #2563b0;
      color: #fff;
    }

    .tab-btn.delete {
      background: #7f1d1d;
      color: #fca5a5;
    }

    .tab-btn.active.link {
      background: #4885ed;
    }

    .tab-btn.active.delete {
      background: #c0392b;
      color: #fff;
    }

    .tab-content {
      display: none;
      padding: 28px 24px 24px;
      text-align: center;
    }

    .tab-content.link { background: rgba(72,133,237,0.85); }
    .tab-content.delete { background: rgba(192,57,43,0.9); }

    .tab-content.active { display: block; }

    .tab-content i { font-size: 26px; margin-bottom: 8px; }
    .tab-content h3 { margin: 6px 0 12px; font-size: 18px; }
    .tab-content h6 { margin: 0 0 14px; font-size: 13px; opacity: 0.9; }

    .input-row {
      display: flex;
      background: #fff;
      border-radius: 1rem;
      padding: 0.25rem;
      gap: 0.25rem;
    }

    .input-row input {
      flex: 1;
      background: #000;
      border: none;
      border-left: 2px solid #075e54;
      border-radius: 0.7rem 0 0 0.7rem;
      padding: 0.85rem 0.75rem;
      color: #ecf0f1;
      font-size: 14px;
      transition: box-shadow 0.2s;
    }

    .input-row input:focus {
      outline: none;
      box-shadow: inset 8px 8px 8px #075e54, inset -8px -8px 8px #2c3e50;
    }

    .input-row button {
      background: #25d366;
      border: none;
      border-radius: 0 0.8rem 0.8rem 0;
      color: #fff;
      font-weight: 900;
      font-size: 11px;
      letter-spacing: 0.2rem;
      text-transform: uppercase;
      padding: 0.85rem 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover { background: #1da851; }

    .input-row.del-row button {
      background: #a93226;
    }

    .input-row.del-row button:hover { background: #7b241c; }

    #loading-spinner {
      display: none;
      margin-top: 10px;
    }

    .fa-spinner { animation: spin 1.2s linear infinite; }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #pair { margin-top: 10px; }

    #delete-result {
      margin-top: 12px;
      font-size: 13px;
      font-weight: bold;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="tabs">
      <button class="tab-btn link active" onclick="switchTab('link')">
        <i class="fa fa-link"></i> &nbsp;Link Number
      </button>
      <button class="tab-btn delete" onclick="switchTab('delete')">
        <i class="fa fa-trash"></i> &nbsp;Delete Number
      </button>
    </div>

    <div class="tab-content link active" id="tab-link">
      <i class="fa fa-user"></i>
      <h3>Link with phone number</h3>
      <h6>🔢 Enter your number with country code.</h6>
      <div class="input-row">
        <input placeholder="+94729xxxxxx" type="number" id="number">
        <button id="submit">Submit</button>
      </div>
      <div id="loading-spinner">
        <i class="fas fa-spinner fa-spin"></i>
      </div>
      <main id="pair"></main>
    </div>

    <div class="tab-content delete" id="tab-delete">
      <i class="fa fa-trash"></i>
      <h3>Delete Number</h3>
      <h6>🔢 Enter number with country code to delete.</h6>
      <div class="input-row del-row">
        <input placeholder="+94729xxxxxx" type="number" id="del-number">
        <button id="del-submit">Delete</button>
      </div>
      <div id="delete-result"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelector('.tab-btn.' + tab).classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    }

    async function Copy() {
      const obj = document.getElementById("copy");
      await navigator.clipboard.writeText(obj.innerText.replace('CODE: ', ''));
      const orig = obj.innerText;
      obj.innerText = "✔️ COPIED";
      obj.style = "color:red;font-weight:bold";
      setTimeout(() => { obj.innerText = orig; obj.style = "color:white;font-weight:bold"; }, 600);
    }

    // --- Link ---
    document.getElementById("submit").addEventListener("click", async (e) => {
      e.preventDefault();
      const c = document.getElementById("number");
      const a = document.getElementById("pair");
      if (!c.value) {
        a.innerHTML = '<span style="color:#000;font-weight:bold">❗ Country code සහිත number enter කරන්න.</span>';
        return;
      }
      const bc = c.value.replace(/[^0-9]/g, "");
      if (bc.length < 11) {
        a.innerHTML = '<span style="color:#000;font-weight:bold">❗ Invalid number format.</span>';
        return;
      }
      let bb = "", bbc = "";
      bc.split('').forEach(ch => {
        bbc += ch;
        bb += (bbc.length === 3 || bbc.length === 8) ? " " + ch : ch;
      });
      c.type = "text";
      c.value = "+" + bb;
      c.style = "color:white;font-size:18px";
      document.getElementById("loading-spinner").style.display = "block";
      a.innerHTML = '';
      const { data } = await axios(`/code?number=${bc}`);
      const code = data.code || "❗ Service Unavailable";
      a.innerHTML = `<font id="copy" onclick="Copy()" style="color:red;font-weight:bold;cursor:pointer" size="5">CODE: <span style="color:white">${code}</span></font><br><br>`;
      document.getElementById("loading-spinner").style.display = "none";
    });

    // --- Delete ---
    document.getElementById("del-submit").addEventListener("click", async (e) => {
      e.preventDefault();
      const num = document.getElementById("del-number").value.replace(/[^0-9]/g, "");
      const result = document.getElementById("delete-result");
      if (!num || num.length < 11) {
        result.innerHTML = '<span style="color:#ffcccc;">❗ Valid number with country code enter කරන්න.</span>';
        return;
      }
      document.getElementById("del-submit").disabled = true;
      result.innerHTML = '<span style="color:#fff;">⏳ Deleting...</span>';
      try {
        const { data } = await axios(`/code/delete?number=${num}`);
        result.innerHTML = `<span style="color:#afffaf;">✅ ${data.message}</span>`;
      } catch (err) {
        result.innerHTML = `<span style="color:#ffcccc;">❌ ${err?.response?.data?.error || 'Delete failed'}</span>`;
      }
      document.getElementById("del-submit").disabled = false;
    });
  </script>
</body>
</html>
